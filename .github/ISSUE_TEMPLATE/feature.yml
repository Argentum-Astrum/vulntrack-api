name: Feature request
description: Propose a scoped, testable improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the need independently of a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use a checklist of externally verifiable outcomes.
    validations:
      required: true
  - type: dropdown
    id: release
    attributes:
      label: Target release
      options:
        - v1.0.0
        - v1.1.0
        - later
    validations:
      required: true
