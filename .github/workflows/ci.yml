name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: 1 · Format and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check formatting
        run: make format-check

      - name: Run static lint
        run: make lint

  test:
    name: 2 · Test and coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests with reports
        run: make test

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: error
          retention-days: 14

  build:
    name: 3 · Build package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build tooling
        run: python -m pip install -e ".[dev]"

      - name: Build source and wheel distributions
        run: make build

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-package-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  security:
    name: 4 · Security checks
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tooling
        run: python -m pip install -e ".[dev]"

      - name: Run SAST and dependency audit
        run: make security

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14

  release:
    name: 5 · Publish release
    needs: security
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'release:'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download verified package
        uses: actions/download-artifact@v8
        with:
          name: python-package-${{ github.run_id }}
          path: dist/

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create release or refresh artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/* --clobber
          else
            gh release create "${VERSION}" dist/* \
              --target "${GITHUB_SHA}" \
              --title "${VERSION}" \
              --generate-notes
          fi
