stages:
  - lint
  - test
  - build
  - security
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install -e ".[dev]"
  cache:
    key:
      files:
        - pyproject.toml
        - requirements-audit.txt
    paths:
      - .cache/pip/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_AUDIT_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip-audit"

lint:
  stage: lint
  script:
    - make format-check
    - make lint

test:
  stage: test
  script:
    - make test
  coverage: '/TOTAL.*\s+(\d+(?:\.\d+)?%)/'
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - reports/
    reports:
      junit: reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml

build:
  stage: build
  script:
    - make build
  artifacts:
    expire_in: 30 days
    paths:
      - dist/

security:
  stage: security
  script:
    - make security
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - reports/bandit.json
      - reports/pip-audit.json

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  before_script: []
  needs:
    - job: build
      artifacts: true
    - job: security
      artifacts: false
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Publishing verified package for $CI_COMMIT_TAG"
  artifacts:
    expire_in: 1 year
    paths:
      - dist/
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG"
    assets:
      links:
        - name: "Python package artifacts"
          url: "$CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/download"
